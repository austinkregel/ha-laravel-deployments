server {
    listen 8099;
    listen [::]:8099;
    server_name _;
    root /data/app/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    client_max_body_size 100M;

    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_index index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Pass HA ingress headers to PHP
        fastcgi_param HTTP_X_REMOTE_USER_ID $http_x_remote_user_id;
        fastcgi_param HTTP_X_REMOTE_USER_NAME $http_x_remote_user_name;
        fastcgi_param HTTP_X_REMOTE_USER_DISPLAY_NAME $http_x_remote_user_display_name;
        fastcgi_param HTTP_X_INGRESS_PATH $http_x_ingress_path;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
